<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a1040"/>
      <stop offset="100%" stop-color="#0d0d1a"/>
    </radialGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="50%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="warm" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#f97316"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-strong">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="256" cy="256" r="256" fill="url(#bg)"/>

  <!-- Neural network lines - forming abstract brain shape -->
  <g stroke="url(#accent)" stroke-width="1.5" opacity="0.4">
    <!-- Left hemisphere - forms 'L' shape -->
    <line x1="170" y1="150" x2="200" y2="200"/>
    <line x1="170" y1="150" x2="140" y2="200"/>
    <line x1="200" y1="200" x2="256" y2="180"/>
    <line x1="140" y1="200" x2="256" y2="180"/>
    <line x1="200" y1="200" x2="170" y2="260"/>
    <line x1="140" y1="200" x2="170" y2="260"/>
    <line x1="170" y1="260" x2="256" y2="256"/>
    <line x1="256" y1="180" x2="256" y2="256"/>
    <line x1="170" y1="150" x2="170" y2="260"/>
    <!-- L shape base -->
    <line x1="170" y1="310" x2="256" y2="256"/>
    <line x1="256" y1="310" x2="256" y2="256"/>
    <line x1="170" y1="310" x2="256" y2="310"/>
    <line x1="340" y1="310" x2="256" y2="310"/>
    <line x1="340" y1="310" x2="256" y2="256"/>

    <!-- Right hemisphere - more scattered (creative side) -->
    <line x1="340" y1="150" x2="310" y2="200"/>
    <line x1="340" y1="150" x2="370" y2="200"/>
    <line x1="310" y1="200" x2="256" y2="180"/>
    <line x1="370" y1="200" x2="256" y2="180"/>
    <line x1="310" y1="200" x2="340" y2="260"/>
    <line x1="370" y1="200" x2="340" y2="260"/>
    <line x1="340" y1="260" x2="256" y2="256"/>
    <line x1="340" y1="260" x2="310" y2="310"/>
    <line x1="340" y1="260" x2="370" y2="310"/>
    <line x1="310" y1="310" x2="256" y2="310"/>
    <line x1="370" y1="310" x2="256" y2="310"/>
    <line x1="370" y1="310" x2="340" y2="260"/>

    <!-- Cross connections -->
    <line x1="170" y1="150" x2="340" y2="150"/>
    <line x1="200" y1="200" x2="310" y2="200"/>
    <line x1="170" y1="260" x2="340" y2="260"/>
  </g>

  <!-- Nodes - neural network points -->
  <g filter="url(#glow)">
    <!-- L-shape nodes (structured/logical) - indigo -->
    <circle cx="170" cy="150" r="8" fill="#6366f1"/>
    <circle cx="200" cy="200" r="7" fill="#818cf8"/>
    <circle cx="140" cy="200" r="6" fill="#818cf8"/>
    <circle cx="170" cy="260" r="8" fill="#6366f1"/>
    <circle cx="170" cy="310" r="9" fill="#6366f1"/>
    <circle cx="256" cy="310" r="7" fill="#818cf8"/>

    <!-- Right hemisphere nodes (creative) - cyan -->
    <circle cx="340" cy="150" r="7" fill="#06b6d4"/>
    <circle cx="310" cy="200" r="6" fill="#22d3ee"/>
    <circle cx="370" cy="200" r="6" fill="#22d3ee"/>
    <circle cx="340" cy="260" r="7" fill="#06b6d4"/>
    <circle cx="310" cy="310" r="6" fill="#22d3ee"/>
    <circle cx="370" cy="310" r="6" fill="#22d3ee"/>
    <circle cx="340" cy="310" r="5" fill="#22d3ee"/>

    <!-- Center - core node (warm accent) -->
    <circle cx="256" cy="256" r="14" fill="#f59e0b" filter="url(#glow-strong)"/>
    <circle cx="256" cy="256" r="8" fill="#fbbf24"/>
    <circle cx="256" cy="180" r="7" fill="#a78bfa"/>
    <circle cx="256" cy="310" r="6" fill="#8b5cf6"/>

    <!-- Additional scattered nodes -->
    <circle cx="220" cy="130" r="4" fill="#818cf8" opacity="0.6"/>
    <circle cx="290" cy="130" r="4" fill="#22d3ee" opacity="0.6"/>
    <circle cx="220" cy="340" r="4" fill="#818cf8" opacity="0.6"/>
    <circle cx="290" cy="340" r="4" fill="#22d3ee" opacity="0.6"/>
    <circle cx="130" cy="280" r="3" fill="#818cf8" opacity="0.5"/>
    <circle cx="380" cy="280" r="3" fill="#22d3ee" opacity="0.5"/>
  </g>

  <!-- Subtle outer ring -->
  <circle cx="256" cy="256" r="240" fill="none" stroke="url(#accent)" stroke-width="2" opacity="0.2"/>

  <!-- L monogram - subtle overlay -->
  <g filter="url(#glow)" opacity="0.15">
    <path d="M180 140 L180 370 L300 370" fill="none" stroke="#f59e0b" stroke-width="20" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
